name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, Sign & Release
    runs-on: macos-15
    permissions:
      contents: write  # Required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate release notes

      # Strip the 'v' prefix from the tag (v1.2.3 → 1.2.3)
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set marketing version
        run: |
          xcrun agvtool new-marketing-version "${{ steps.version.outputs.VERSION }}"

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # ── Code Signing ─────────────────────────────────────────────────────────
      # Imports the Developer ID Application certificate into a short-lived
      # keychain so Xcode can sign the archive without interactive prompts.
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Persist for subsequent steps — KEYCHAIN_PATH for cleanup,
          # KEYCHAIN_PASSWORD for explicit unlocks before codesign operations
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # No lock timeout — keeps keychain accessible for all subsequent steps
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/certificate.p12"

          # Allow codesign to access the key without a GUI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Set as default keychain and prepend to the search list,
          # preserving the existing keychains (login.keychain-db etc.)
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | xargs)

      # ── Verify certificate import ─────────────────────────────────────────────
      # This step is intentionally kept verbose so that certificate issues are
      # visible in the CI log. It fails the build immediately rather than letting
      # xcodebuild produce a confusing "no certificate found" error.
      - name: Verify signing identity
        run: |
          echo "=== Identities in build keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          TOTAL=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -c "valid identity" || true)
          COUNT=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -c "Developer ID Application" || true)

          if [ "$TOTAL" -gt 0 ] && [ "$COUNT" -eq 0 ]; then
            echo ""
            echo "ERROR: A signing identity was found, but it is not a 'Developer ID Application'"
            echo "certificate. Found certificate type is shown above."
            echo ""
            echo "Developer ID Application is required for distributing macOS apps outside"
            echo "the App Store. Apple Development / Apple Distribution certificates will not work."
            echo ""
            echo "To get one: Xcode → Settings → Accounts → Manage Certificates → + →"
            echo "Developer ID Application. Then export it from Keychain Access via"
            echo "'Export Items' and update the APPLE_CERTIFICATE secret."
            exit 1
          fi

          if [ "$COUNT" -eq 0 ]; then
            echo ""
            echo "ERROR: No 'Developer ID Application' identity found in the build keychain."
            echo "The most likely cause is that the .p12 was exported without its private key."
            echo ""
            echo "To fix: open Keychain Access → right-click the Developer ID Application"
            echo "certificate entry → 'Export Items' (not 'Export Certificate') → set a"
            echo "password → base64-encode the resulting .p12 and update APPLE_CERTIFICATE."
            exit 1
          fi

          echo ""
          echo "Found $COUNT Developer ID Application identity/identities. Proceeding."

      # ── Archive ───────────────────────────────────────────────────────────────
      - name: Build archive
        run: |
          # Unlock in case the OS re-locked between steps
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          xcodebuild archive \
            -project "Torrent Editor.xcodeproj" \
            -scheme "Torrent Editor" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/TorrentEditor.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            ONLY_ACTIVE_ARCH=NO

      # ── Export ────────────────────────────────────────────────────────────────
      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

      - name: Export archive
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/TorrentEditor.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # ── Package ───────────────────────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          # Stage only the .app — xcodebuild -exportArchive also writes
          # packaging.log, distributionSummary.plist etc. into the export
          # folder and create-dmg would include them all otherwise.
          mkdir -p "$RUNNER_TEMP/dmg_staging"
          cp -R "$RUNNER_TEMP/export/Torrent Editor.app" "$RUNNER_TEMP/dmg_staging/"

          create-dmg \
            --volname "Torrent Editor" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Torrent Editor.app" 175 190 \
            --hide-extension "Torrent Editor.app" \
            --app-drop-link 425 190 \
            "$RUNNER_TEMP/TorrentEditor-${{ steps.version.outputs.VERSION }}.dmg" \
            "$RUNNER_TEMP/dmg_staging/"

      # ── Notarize ──────────────────────────────────────────────────────────────
      # Uses the App Store Connect API key (preferred over Apple ID + password).
      # Notarizes and staples the DMG so Gatekeeper accepts it on first launch.
      - name: Notarize and staple DMG
        env:
          NOTARIZE_API_KEY_ID: ${{ secrets.NOTARIZE_API_KEY_ID }}
          NOTARIZE_API_ISSUER_ID: ${{ secrets.NOTARIZE_API_ISSUER_ID }}
          NOTARIZE_API_KEY: ${{ secrets.NOTARIZE_API_KEY }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/api_key.p8"
          echo "$NOTARIZE_API_KEY" | base64 --decode > "$API_KEY_PATH"

          xcrun notarytool submit \
            "$RUNNER_TEMP/TorrentEditor-${{ steps.version.outputs.VERSION }}.dmg" \
            --key "$API_KEY_PATH" \
            --key-id "$NOTARIZE_API_KEY_ID" \
            --issuer "$NOTARIZE_API_ISSUER_ID" \
            --wait \
            --verbose

          xcrun stapler staple \
            "$RUNNER_TEMP/TorrentEditor-${{ steps.version.outputs.VERSION }}.dmg"

          rm "$API_KEY_PATH"

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Remove signing keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      # ── Publish ───────────────────────────────────────────────────────────────
      # Auto-generates release notes from PRs/commits merged since the last tag.
      # Pre-release is detected automatically: tags like v1.0.0-beta.1 or v2.0.0-rc.1.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ github.ref_name }}" \
            "$RUNNER_TEMP/TorrentEditor-${{ steps.version.outputs.VERSION }}.dmg" \
            --title "Torrent Editor ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            $PRERELEASE_FLAG

      # ── Appcast (Sparkle) ─────────────────────────────────────────────────────
      # Downloads Sparkle tools at the pinned version, signs the DMG with the
      # EdDSA private key, generates appcast.xml, and publishes it to GitHub Pages
      # so the in-app updater can discover new releases automatically.
      #
      # Skipped for pre-release tags (e.g. v1.0.0-beta.1) — those land on GitHub
      # Releases as pre-releases but are not surfaced to all users via the appcast.
      #
      # Required secret: SPARKLE_PRIVATE_KEY
      #   Run this once on your Mac to retrieve it from your keychain:
      #   security find-generic-password -s "ed25519" -w | pbcopy
      #   Paste the result into the SPARKLE_PRIVATE_KEY repository secret.
      - name: Download Sparkle tools
        if: "!contains(github.ref_name, '-')"
        run: |
          SPARKLE_VERSION=$(jq -r \
            '.pins[] | select(.identity == "sparkle") | .state.version' \
            "Torrent Editor.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved")
          echo "SPARKLE_VERSION=$SPARKLE_VERSION" >> "$GITHUB_ENV"

          curl -fL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle_tools"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle_tools"

      - name: Generate appcast
        if: "!contains(github.ref_name, '-')"
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/sparkle_key"
          echo "$SPARKLE_PRIVATE_KEY" > "$KEY_PATH"

          # generate_appcast signs every archive in the folder, so give it
          # a clean directory containing only the current release DMG.
          mkdir -p "$RUNNER_TEMP/appcast_src"
          cp "$RUNNER_TEMP/TorrentEditor-${{ steps.version.outputs.VERSION }}.dmg" \
            "$RUNNER_TEMP/appcast_src/"

          "$RUNNER_TEMP/sparkle_tools/bin/generate_appcast" \
            --ed-key-file "$KEY_PATH" \
            --download-url-prefix \
              "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" \
            --link "https://github.com/${{ github.repository }}" \
            "$RUNNER_TEMP/appcast_src/"

          rm "$KEY_PATH"

          # Copy to a workspace-relative path — required by the deploy action
          mkdir -p appcast_deploy
          cp "$RUNNER_TEMP/appcast_src/appcast.xml" appcast_deploy/

      - name: Deploy appcast to GitHub Pages
        if: "!contains(github.ref_name, '-')"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd appcast_deploy
          # .nojekyll prevents GitHub Pages from running Jekyll on the appcast
          touch .nojekyll
          git init -b gh-pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add appcast.xml .nojekyll
          git commit -m "Update appcast for ${{ github.ref_name }}"
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
